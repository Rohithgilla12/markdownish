name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish (e.g. v0.1.0). Leave blank to read from package.json."
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & sign (macOS universal)
    runs-on: macos-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust (universal-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Drives signing + notarization. Each secret block runs only if the
      # corresponding secrets are configured. Missing secrets fall back to an
      # unsigned build (still usable, just shows the "unidentified developer"
      # warning on first launch).
      - name: Build, sign, notarize, draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Developer ID Application cert exported as a base64-encoded .p12.
          # See RELEASING.md for the exact `security` + `base64` commands.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

          # The full Code Signing identity string:
          #   "Developer ID Application: Your Name (TEAMID)"
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

          # Notarization via notarytool — either App-Specific Password
          # (APPLE_ID + APPLE_PASSWORD + APPLE_TEAM_ID) or an API key
          # (APPLE_API_KEY + APPLE_API_ISSUER + APPLE_API_KEY_ID).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "Markdownish ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          releaseBody: |
            ## Markdownish ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

            Drag the `.app` from the `.dmg` to `/Applications`. On first launch,
            macOS may still prompt for confirmation even though the build is
            signed and notarized — that's normal for a fresh Developer ID.

            ### Shell wrapper

            ```bash
            md() { open -a "Markdownish" "${1:-$(pwd)}" }
            ```

            See [README](https://github.com/${{ github.repository }}#readme) for the full feature list.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: --target universal-apple-darwin --verbose
