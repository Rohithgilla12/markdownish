name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1)."
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  # macOS Apple Silicon only. CLAUDE.md is M-series-first; Intel users can
  # download the dmg, but auto-update is keyed to darwin-aarch64.
  RUST_TARGET: aarch64-apple-darwin

jobs:
  build:
    name: Build · sign · notarize
    runs-on: macos-latest
    timeout-minutes: 60

    permissions:
      contents: write

    outputs:
      release_id: ${{ steps.tauri.outputs.releaseId }}
      release_upload_url: ${{ steps.tauri.outputs.releaseUploadUrl }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust (Apple Silicon)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.RUST_TARGET }}

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      - name: Build · sign · notarize · draft release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Tauri updater signing (minisign). Without this, the .app.tar.gz.sig
          # won't be produced and auto-updates won't verify.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # Apple Developer ID — signing + notarization.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

        with:
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: "Markdownish ${{ steps.tag.outputs.tag }}"
          releaseBody: |
            ## Markdownish ${{ steps.tag.outputs.tag }}

            Apple Silicon (`aarch64-apple-darwin`), signed + notarized.

            Drag the `.app` from the `.dmg` to `/Applications`. Subsequent
            updates install automatically via the in-app banner.

            ### Shell wrapper

            ```bash
            md() { open -a "Markdownish" "${1:-$(pwd)}" }
            ```
          releaseDraft: true
          prerelease: false
          # We attach latest.json ourselves in the next job so the file
          # always reflects the artifacts that actually got uploaded.
          includeUpdaterJson: false
          args: --target ${{ env.RUST_TARGET }} --verbose

      - name: Stage updater artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staged
          BUNDLE_DIR="src-tauri/target/${RUST_TARGET}/release/bundle"
          # The .app.tar.gz is the updater payload; the .sig is the minisign
          # signature over it. Both must be present to ship a working update.
          find "$BUNDLE_DIR" -type f \( -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) \
            -exec cp {} staged/ \;
          echo "Staged:"
          ls -la staged/

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-artifacts
          path: staged/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Generate latest.json · attach to release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout (for repo metadata only)
        uses: actions/checkout@v4

      - name: Download updater artifacts
        uses: actions/download-artifact@v4
        with:
          name: updater-artifacts
          path: dist

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail

          SEMVER="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          # The .sig file we read locally (its bytes go into latest.json).
          # tauri-action stages the sig under the same basename as the bundle,
          # both inside src-tauri/target/.../bundle.
          SIG="$(find dist -type f -name '*.app.tar.gz.sig' | head -1)"
          if [ -z "$SIG" ] || [ ! -f "$SIG" ]; then
            echo "ERROR: no .sig file in artifact"
            exit 1
          fi

          # The bundle URL has to point at the asset name *as it appears on
          # the release*, not the staged local filename — tauri-action appends
          # the architecture suffix (Markdownish.app.tar.gz becomes
          # Markdownish_aarch64.app.tar.gz once uploaded).
          ASSET_NAME="$(gh release view "$TAG" --json assets \
            --jq '.assets[] | select(.name | endswith(".app.tar.gz")) | .name')"
          if [ -z "$ASSET_NAME" ]; then
            echo "ERROR: no .app.tar.gz asset found on release $TAG"
            exit 1
          fi
          echo "Bundle asset name on release: $ASSET_NAME"

          jq -n \
            --arg version  "$SEMVER" \
            --arg notes    "Markdownish $TAG" \
            --arg pub_date "$PUB_DATE" \
            --rawfile sig  "$SIG" \
            --arg url      "$BASE/$ASSET_NAME" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $sig, url: $url }
              }
            }' > latest.json

          jq . latest.json

      - name: Attach latest.json to the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release upload "$TAG" latest.json --clobber
          echo "Attached to: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
